spring.datasource.url=jdbc:mysql://localhost:3306/clinica_usuarios?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Dejamos que Hibernate autodetecte el dialecto moderno de MySQL automáticamente
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Configuración de inicialización (Flyway se encargará de la estructura)
spring.sql.init.mode=always
spring.jpa.hibernate.ddl-auto=none