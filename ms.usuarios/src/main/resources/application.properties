spring.application.name=ms-usuarios
server.port=8096
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyHbmImpl


# PASO 2 (Swagger): Configuracion de SpringDoc / Swagger UI
# =============================================================================
# Habilita la generacion automatica de la documentacion OpenAPI (JSON/YAML)
springdoc.api-docs.enabled=true
# Habilita la interfaz visual de Swagger UI para probar endpoints desde el navegador
springdoc.swagger-ui.enabled=true
# Ruta personalizada donde se abrira Swagger UI (http://localhost:8096/doc/swagger-ui.html)
springdoc.swagger-ui.path=/doc/swagger-ui.html

spring.profiles.active=dev