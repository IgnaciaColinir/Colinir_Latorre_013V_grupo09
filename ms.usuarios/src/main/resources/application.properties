spring.application.name=ms-usuario
server.port=8086
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyHbmImpl
# Cambiamos 'localhost' por 'eureka-server' (o como se llame el servicio en tu docker-compose)
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true


# PASO 2 (Swagger): Configuracion de SpringDoc / Swagger UI
# =============================================================================
# Habilita la generacion automatica de la documentacion OpenAPI (JSON/YAML)
springdoc.api-docs.enabled=true
# Habilita la interfaz visual de Swagger UI para probar endpoints desde el navegador
springdoc.swagger-ui.enabled=true
# Ruta personalizada donde se abrira Swagger UI (http://localhost:8096/doc/swagger-ui.html)
springdoc.swagger-ui.path=/doc/swagger-ui.html

spring.profiles.active=dev