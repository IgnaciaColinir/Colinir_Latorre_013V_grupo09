eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      probes:
        enabled: true

# ---------------------------------------------------
# AGREGACIÓN CENTRALIZADA DE SWAGGER UI
# ---------------------------------------------------
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    disable-swagger-default-url: true
    urls-primary-name: ms-auth
    urls:
      - name: ms-auth
        url: /api-docs/ms-auth
      - name: ms-usuarios
        url: /api-docs/ms-usuarios
      - name: ms-paciente
        url: /api-docs/ms-paciente
