version: '3.8'

services:
  # El motor de base de datos único para toda la clínica
  mysql-db:
    image: mysql:8.0
    container_name: mysql-clinica
    environment:
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - clinica-network

  # ========================================================

  # 1. Autenticación
  ms-auth:
    image: openjdk:21-slim
    container_name: ms-auth
    ports:
      - "8090:8090"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/clinica_auth?createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
    depends_on:
      - mysql-db
    networks:
      - clinica-network

  # 2. Servicios Clínicos
  ms-servicios:
    image: openjdk:21-slim
    container_name: ms-servicios
    ports:
      - "8091:8091"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/clinica_servicios?createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
    depends_on:
      - mysql-db
    networks:
      - clinica-network

  # 3. Profesionales
  ms-profesionales:
    image: openjdk:21-slim
    container_name: ms-profesionales
    ports:
      - "8092:8092"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/clinica_profesionales?createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
    depends_on:
      - mysql-db
    networks:
      - clinica-network

  # 4. Inventario (Bodega)
  ms-inventario:
    image: openjdk:21-slim
    container_name: ms-inventario
    ports:
      - "8093:8093"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/clinica_inventario?createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
    depends_on:
      - mysql-db
    networks:
      - clinica-network

  # ========================================================


  # 5. Usuarios
  ms-usuarios:
    image: openjdk:21-slim
    container_name: ms-usuarios
    ports:
      - "8096:8096"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/clinica_usuarios?createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
    depends_on:
      - mysql-db
    networks:
      - clinica-network

  # 6. Paciente (Depende de que exista el sistema de usuarios base)
  ms-paciente:
    image: openjdk:21-slim
    container_name: ms-paciente
    ports:
      - "8095:8095"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/clinica_pacientes?createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
    depends_on:
      - mysql-db
      - ms-usuarios
    networks:
      - clinica-network

  # 7. Agenda (Depende de Pacientes y Profesionales para agendar)
  ms-agenda:
    image: openjdk:21-slim
    container_name: ms-agenda
    ports:
      - "8097:8097"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/clinica_agenda?createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
    depends_on:
      - mysql-db
      - ms-paciente
      - ms-profesionales
    networks:
      - clinica-network

  # 8. Consultas (Depende de la Agenda previa)
  ms-consultas:
    image: openjdk:21-slim
    container_name: ms-consultas
    ports:
      - "8098:8098"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/clinica_consultas?createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
    depends_on:
      - mysql-db
      - ms-agenda
    networks:
      - clinica-network

  # 9. Pagos (CRÍTICO: Depende estrictamente de Consultas según el diagrama)
  ms-pagos:
    image: openjdk:21-slim
    container_name: ms-pagos
    ports:
      - "8099:8099"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/clinica_pagos?createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
    depends_on:
      - mysql-db
      - ms-consultas
    networks:
      - clinica-network

  # ========================================================


  # 10. Fichas Médicas (Depende de Pacientes e Historial de Consultas)
  ms-fichas:
    image: openjdk:21-slim
    container_name: ms-fichas
    ports:
      - "8094:8094"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/clinica_fichas?createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
    depends_on:
      - mysql-db
      - ms-paciente
      - ms-consultas
    networks:
      - clinica-network

volumes:
  mysql_data:

networks:
  clinica-network:
    driver: bridge
