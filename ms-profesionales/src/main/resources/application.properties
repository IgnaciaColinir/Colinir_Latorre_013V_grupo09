# nombre del proyecto
spring.application.name=ms-profesionales

# PUERTO NUEVO PARA QUE NO CHOQUE CON PACIENTES
server.port=8081

# Prueba en CASA
spring.datasource.url=jdbc:h2:mem:clinica_profesionales
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Para probar en el Duoc
# spring.datasource.url=jdbc:mysql://localhost:3306/clinica_profesionales
# spring.datasource.username=root
# spring.datasource.password=1234

# Configuracion de JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.h2.console.enabled=true